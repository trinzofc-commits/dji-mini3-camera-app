plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.trinzflycam.app'
    compileSdk 34

    defaultConfig {
        applicationId "com.trinzflycam.app"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        
        ndk {
            abiFilters 'arm64-v8a', 'armeabi-v7a'
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }
    buildFeatures {
        viewBinding true
    }
    packagingOptions {
        doNotStrip "*/*/libdjivideo.so"
        doNotStrip "*/*/libSDKRelativeJNI.so"
        doNotStrip "*/*/libFlySafeRelativeJNI.so"
        doNotStrip "*/*/libndk-gstreamer.so"
        doNotStrip "*/*/libv_native_utils.so"
        doNotStrip "*/*/libDJIUpgradeCore.so"
        doNotStrip "*/*/libDJIUpgradeJNI.so"
        doNotStrip "*/*/libDJIWaypointV2Core.so"
        doNotStrip "*/*/libDJIWaypointV2JNI.so"
        doNotStrip "*/*/librdk_jni.so"
        doNotStrip "*/*/libdjisdk_jni.so"
        doNotStrip "*/*/libdjiv5-base-jni.so"
        doNotStrip "*/*/libdjiv5-aircraft-jni.so"
        
        pickFirst 'lib/x86/libc++_shared.so'
        pickFirst 'lib/x86_64/libc++_shared.so'
        pickFirst 'lib/armeabi-v7a/libc++_shared.so'
        pickFirst 'lib/arm64-v8a/libc++_shared.so'
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.10.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    
    // DJI SDK V5
    implementation 'com.dji:dji-sdk-v5-aircraft:5.10.0'
    compileOnly 'com.dji:dji-sdk-v5-aircraft-provided:5.10.0'
    
    // DJI UX SDK V5 (Cần thiết cho FPVWidget)
    implementation 'com.dji:dji-uxsdk-v5:5.10.0'
    
    // Các thư viện hỗ trợ cần thiết cho DJI SDK
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.6.2'
    implementation 'androidx.lifecycle:lifecycle-viewmodel-ktx:2.6.2'
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
}
